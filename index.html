<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tiệm giấy Thứ Ba - Quản lý giá vốn</title>
    <link rel="icon" href="./tachnen.png">
    <link rel="shortcut icon" href="./tachnen.png">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="tiệm giấy Thứ Ba - Quản lý giá vốn">
    <link rel="apple-touch-icon" href="./tachnen.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#ea580c', 600: '#c2410c' }, slate: { 800: '#1e293b', 900: '#0f172a' } }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .nav-active { background-color: #ea580c !important; color: white !important; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.25); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        input[type="text"], input[type="number"], select, textarea { font-size: 16px; }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // TIỆN ÍCH NÉN ẢNH (Bảo vệ Google Sheets không bị quá tải data)
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); // Nén 50% chất lượng
                    };
                };
                reader.onerror = error => reject(error);
            });
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            const [materials, setMaterials] = useState([]);
            const [purchases, setPurchases] = useState([]);
            const [products, setProducts] = useState([]);
            const [showNotification, setShowNotification] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            
            const [editingMaterial, setEditingMaterial] = useState(null);
            const [editingPurchase, setEditingPurchase] = useState(null);
            const [viewingImage, setViewingImage] = useState(null);

            // THÊM: Các state dùng cho chức năng tìm kiếm và hiển thị đơn vị
            const [searchDashboard, setSearchDashboard] = useState('');
            const [searchInventory, setSearchInventory] = useState('');
            const [searchRecipeMaterial, setSearchRecipeMaterial] = useState('');
            const [selectedMaterialIdForPurchase, setSelectedMaterialIdForPurchase] = useState('');

            const [scriptUrl, setScriptUrl] = useState(localStorage.getItem('tg_script_url') || '');
            
            const [newProduct, setNewProduct] = useState({ id: null, name: '', recipe: [], customCost: 0 });

            useEffect(() => { if (!scriptUrl) return; loadData(); }, []);

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(scriptUrl);
                    const data = await response.json();
                    setMaterials(data.materials || []);
                    setPurchases(data.purchases || []);
                    setProducts(data.products || []);
                    notify("Đã tải dữ liệu");
                } catch (err) {
                    console.error(err);
                    notify("Không thể kết nối. Vui lòng kiểm tra cấu hình.");
                } finally { setIsLoading(false); }
            };

            const syncData = async (m, pur, pro) => {
                if (!scriptUrl) return;
                setIsSaving(true);
                try {
                    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ materials: m, purchases: pur, products: pro }) });
                } catch (err) {
                    console.error(err);
                    notify("Lỗi lưu dữ liệu!");
                } finally { setIsSaving(false); }
            };

            const notify = (msg) => {
                setShowNotification(msg);
                setTimeout(() => setShowNotification(null), 3000);
            };

            const switchTab = (tab) => {
                setActiveTab(tab);
                setIsSidebarOpen(false);
            };

            const materialCosts = useMemo(() => {
                const costs = {};
                materials.forEach(m => {
                    const matPurchases = purchases.filter(p => p.materialId === m.id);
                    if (matPurchases.length === 0) { costs[m.id] = 0; return; }
                    const totalQty = matPurchases.reduce((sum, p) => sum + Number(p.quantity), 0);
                    const totalVal = matPurchases.reduce((sum, p) => sum + (Number(p.quantity) * Number(p.price)), 0);
                    costs[m.id] = totalQty > 0 ? totalVal / totalQty : 0;
                });
                return costs;
            }, [materials, purchases]);

            const calculateProductCOGS = (product) => {
                let ingredientTotal = 0;
                product.recipe.forEach(item => {
                    if (item.inputType === 'cost') {
                        ingredientTotal += Number(item.costValue || 0);
                    } else {
                        const avgPrice = materialCosts[item.materialId] || 0;
                        ingredientTotal += (Number(item.amount || 0) * avgPrice);
                    }
                });
                return ingredientTotal + Number(product.customCost || 0);
            };

            const addOrUpdateMaterial = (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const unit = e.target.unit.value;
                if (!name) return;
                
                let newM;
                if (editingMaterial) {
                    newM = materials.map(m => m.id === editingMaterial.id ? { ...m, name, unit } : m);
                    setEditingMaterial(null);
                    notify("Đã cập nhật nguyên liệu");
                } else {
                    newM = [...materials, { id: Date.now().toString(), name, unit }];
                    notify("Đã thêm nguyên liệu");
                }
                
                setMaterials(newM); 
                syncData(newM, purchases, products);
                e.target.reset(); 
            };

            const deleteMaterial = (id) => {
                const mat = materials.find(m => m.id === id);
                if (purchases.some(p => p.materialId === id)) return notify(`Dữ liệu của "${mat.name}" đã có nhập kho, không thể xóa`);
                if (products.some(p => p.recipe.some(r => r.materialId === id))) return notify(`Nguyên liệu "${mat.name}" đang nằm trong định mức sản phẩm, không thể xóa`);
                
                if (window.confirm(`Bạn có chắc chắn muốn xóa nguyên liệu "${mat.name}" không?`)) {
                    const newM = materials.filter(m => m.id !== id);
                    setMaterials(newM); 
                    syncData(newM, purchases, products);
                    notify("Đã xóa nguyên liệu");
                }
            };

            const addOrUpdatePurchase = async (e) => {
                e.preventDefault();
                const materialId = e.target.materialId.value;
                const quantity = Number(e.target.quantity.value);
                const totalCost = Number(e.target.totalCost.value);
                const date = e.target.date.value || new Date().toISOString().split('T')[0];
                const fileInput = e.target.receiptImage;
                
                if (!materialId || quantity <= 0 || totalCost < 0) return;
                
                const price = totalCost / quantity;
                let receiptBase64 = editingPurchase?.receiptImage || null;

                if (fileInput && fileInput.files.length > 0) {
                    try {
                        notify("Đang xử lý ảnh hóa đơn...");
                        receiptBase64 = await compressImage(fileInput.files[0]);
                    } catch (err) {
                        notify("Lỗi xử lý ảnh, hóa đơn sẽ lưu không có ảnh.");
                    }
                }

                let newPur;
                if (editingPurchase) {
                    newPur = purchases.map(p => p.id === editingPurchase.id ? { ...p, materialId, quantity, price, date, receiptImage: receiptBase64 } : p);
                    setEditingPurchase(null);
                    notify("Đã cập nhật dòng nhập kho");
                } else {
                    newPur = [...purchases, { id: Date.now().toString(), materialId, quantity, price, date, receiptImage: receiptBase64 }];
                    notify("Đã ghi nhận kho");
                }

                setPurchases(newPur); syncData(materials, newPur, products);
                e.target.reset();
            };

            const deletePurchaseLine = (id) => {
                if(!window.confirm("Bạn có chắc chắn muốn xóa lần nhập kho này?")) return;
                const newP = purchases.filter(p => p.id !== id);
                setPurchases(newP); syncData(materials, newP, products);
                notify("Đã xóa dòng nhập kho");
            };

            const saveProduct = () => {
                if (!newProduct.name || newProduct.recipe.length === 0) return notify("Vui lòng điền đủ thông tin");
                
                let newPro;
                if (newProduct.id) {
                    newPro = products.map(p => p.id === newProduct.id ? { ...newProduct } : p);
                    notify("Đã cập nhật định mức sản phẩm");
                } else {
                    newPro = [...products, { ...newProduct, id: Date.now().toString() }];
                    notify("Đã lưu định mức sản phẩm mới");
                }

                setProducts(newPro); syncData(materials, purchases, newPro);
                setNewProduct({ id: null, name: '', recipe: [], customCost: 0 });
            };

            const exportPurchaseHistory = () => {
                if (purchases.length === 0) return notify("Không có dữ liệu để xuất");
                const bom = '\uFEFF';
                const sortedPurchases = [...purchases].sort((a, b) => new Date(b.date) - new Date(a.date));
                const csv = "Ngày;Tên nguyên liệu;Số lượng;Đơn giá bình quân;Thành tiền\n" + 
                    sortedPurchases.map(p => {
                        const m = materials.find(mat => mat.id === p.materialId);
                        const name = m ? m.name : 'Đã xóa';
                        return `${p.date};${name};${p.quantity};${Math.round(p.price)};${Math.round(p.quantity * p.price)}`;
                    }).join("\n");
                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "lich_su_nhap_kho_giathuba.csv"; link.click();
            };

            const DashboardView = () => {
                // SỬA: Lọc danh sách nguyên liệu active kết hợp với ô tìm kiếm
                const activeMaterials = materials.filter(m => purchases.some(p => p.materialId === m.id) && m.name.toLowerCase().includes(searchDashboard.toLowerCase()));
                return (
                    <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 md:space-y-8">
                        <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 md:gap-6">
                            <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-200">
                                <p className="text-xs md:text-sm font-medium text-slate-500">Tổng nguyên liệu</p>
                                <p className="text-2xl md:text-3xl font-bold text-slate-900 mt-1 md:mt-2">{materials.length}</p>
                            </div>
                            <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-200">
                                <p className="text-xs md:text-sm font-medium text-slate-500">Số lần nhập</p>
                                <p className="text-2xl md:text-3xl font-bold text-slate-900 mt-1 md:mt-2">{purchases.length}</p>
                            </div>
                            <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-200">
                                <p className="text-xs md:text-sm font-medium text-slate-500">Tổng chi phí</p>
                                <p className="text-2xl md:text-3xl font-bold text-amber-600 mt-1 md:mt-2">
                                    {Math.round(purchases.reduce((sum, p) => sum + (p.quantity * p.price), 0)).toLocaleString()} đ
                                </p>
                            </div>
                            <div className="bg-white p-4 md:p-6 rounded-2xl border border-brand-100 bg-brand-50/20">
                                <p className="text-xs md:text-sm font-medium text-brand-600">Định mức sản phẩm</p>
                                <p className="text-2xl md:text-3xl font-bold text-brand-600 mt-1 md:mt-2">{products.length}</p>
                            </div>
                            <button onClick={() => {
                                const bom = '\uFEFF';
                                const csv = "Tên;Đơn vị;Giá TB\n" + materials.map(m => `${m.name};${m.unit};${Math.round(materialCosts[m.id])}`).join("\n");
                                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "bao_cao_giathuba.csv"; link.click();
                            }} className="bg-slate-900 text-white p-4 md:p-6 rounded-2xl shadow-lg hover:bg-slate-800 transition flex items-center justify-between group text-left">
                                <div><p className="text-[10px] md:text-xs font-semibold text-slate-400 uppercase tracking-wider">Báo cáo</p><p className="text-base md:text-lg font-bold">Xuất Excel</p></div>
                                <span className="text-xl md:text-2xl group-hover:scale-110 transition">📥</span>
                            </button>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                            {/* SỬA: Thêm thanh tìm kiếm vào Header của Bảng Giá vốn bình quân */}
                            <div className="px-4 py-4 md:px-6 md:py-5 bg-slate-50/50 border-b border-slate-200 flex flex-wrap justify-between items-center gap-2 md:gap-3">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <span className="text-base md:text-lg"></span>
                                    <h3 className="font-bold text-slate-800 text-sm md:text-base">Giá vốn bình quân nguyên liệu</h3>
                                </div>
                                <input type="text" placeholder="🔍 Tìm nguyên liệu..." value={searchDashboard} onChange={(e) => setSearchDashboard(e.target.value)} className="px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm border border-slate-200 rounded-lg outline-none focus:border-brand-500 w-full sm:w-auto" />
                            </div>
                            <div className="overflow-x-auto w-full custom-scrollbar">
                                <table className="w-full text-left whitespace-nowrap min-w-[500px]">
                                    <thead className="bg-slate-50 text-[10px] md:text-[11px] font-bold text-slate-500 border-b">
                                        <tr>
                                            <th className="px-4 py-3 md:px-8 md:py-4">Tên nguyên liệu</th>
                                            <th className="px-4 py-3 md:px-8 md:py-4">Đơn vị</th>
                                            <th className="px-4 py-3 md:px-8 md:py-4 text-right">Giá bình quân</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y text-xs md:text-sm">
                                        {activeMaterials.map(m => (
                                            <tr key={m.id} className="hover:bg-slate-50 transition group">
                                                <td className="px-4 py-3 md:px-8 md:py-4 font-semibold text-slate-700">{m.name}</td>
                                                <td className="px-4 py-3 md:px-8 md:py-4 text-slate-500">{m.unit}</td>
                                                <td className="px-4 py-3 md:px-8 md:py-4 text-right font-bold text-brand-600">{Math.round(materialCosts[m.id]).toLocaleString()} đ</td>
                                            </tr>
                                        ))}
                                        {activeMaterials.length === 0 && <tr><td colSpan="3" className="p-8 text-center text-slate-400 italic text-xs">Không tìm thấy dữ liệu</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const SettingsView = () => (
                <div className="flex-1 p-4 md:p-12 space-y-6 overflow-y-auto">
                    <div className="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] shadow-sm border border-slate-200 max-w-2xl mx-auto">
                        <h3 className="text-xl md:text-2xl font-black text-slate-800 mb-2">Cài đặt hệ thống</h3>
                        <p className="text-slate-500 text-xs md:text-sm mb-6 md:mb-8">Kết nối với Google Sheets để đồng bộ dữ liệu.</p>
                        <div className="space-y-4 md:space-y-6">
                            <div>
                                <label className="text-[10px] md:text-xs font-bold text-slate-400 mb-2 block uppercase tracking-widest">Google Apps Script URL</label>
                                <textarea className="w-full px-4 py-3 md:px-6 md:py-4 bg-slate-50 border border-slate-200 rounded-xl md:rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all font-mono text-xs md:text-sm" rows="5" placeholder="https://script.google.com/macros/s/..." value={scriptUrl} onChange={(e) => setScriptUrl(e.target.value)} />
                            </div>
                            <button onClick={() => { localStorage.setItem('tg_script_url', scriptUrl); notify("Đã lưu. Đang tải lại..."); loadData(); }} className="w-full bg-brand-600 text-white py-4 md:py-5 rounded-xl md:rounded-2xl font-bold hover:bg-brand-700 transition-all shadow-xl shadow-brand-100 text-sm md:text-base">Lưu cấu hình & Đồng bộ</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-full relative w-full overflow-hidden">
                    {/* Modal hiển thị ảnh hóa đơn */}
                    {viewingImage && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[150] flex items-center justify-center p-4" onClick={() => setViewingImage(null)}>
                            <div className="bg-white p-2 rounded-2xl max-w-full max-h-[90vh] overflow-hidden relative" onClick={e => e.stopPropagation()}>
                                <img src={viewingImage} className="max-w-full max-h-[85vh] object-contain rounded-xl" alt="Hóa đơn" />
                                <button onClick={() => setViewingImage(null)} className="absolute top-4 right-4 bg-slate-900/50 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold hover:bg-slate-900">✕</button>
                            </div>
                        </div>
                    )}

                    {isSidebarOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-40 md:hidden backdrop-blur-sm transition-opacity" onClick={() => setIsSidebarOpen(false)}></div>
                    )}

                    <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 shadow-2xl transform transition-transform duration-300 ease-in-out flex flex-col md:relative md:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-5 md:p-6 flex flex-row items-center gap-3 md:gap-4 bg-slate-800/30 border-b border-slate-700/50">
                            <div className="w-12 h-12 md:w-14 md:h-14 rounded-full bg-white border-2 border-brand-500 flex-shrink-0 flex items-center justify-center text-brand-500 text-xl font-black shadow-lg shadow-brand-500/20 overflow-hidden relative">
                                <span className="absolute z-0">📄</span>
                                <img src="./tachnen.png" alt="Logo" className="w-full h-full object-cover relative z-10" onError={(e)=>e.target.style.display='none'} />
                            </div>
                            <h1 className="text-white font-extrabold text-xs md:text-sm leading-tight tracking-tight text-left">
                                tiệm giấy <span className="text-brand-500 text-base md:text-lg font-black">Thứ Ba</span>
                            </h1>
                        </div>
                        
                        <nav className="flex-1 px-3 py-6 space-y-2 overflow-y-auto custom-scrollbar">
                            <button onClick={() => switchTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all font-semibold text-left text-sm md:text-base ${activeTab === 'dashboard' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>🏠 Tổng quan</span></button>
                            <button onClick={() => switchTab('inventory')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all font-semibold text-left text-sm md:text-base ${activeTab === 'inventory' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>🛒 Kho hàng</span></button>
                            <button onClick={() => switchTab('products')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all font-semibold text-left text-sm md:text-base ${activeTab === 'products' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>📈 Định mức</span></button>
                            <button onClick={() => switchTab('settings')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all font-semibold text-left text-sm md:text-base ${activeTab === 'settings' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>⚙️ Cài đặt</span></button>
                        </nav>
                        <div className="p-4 border-t border-slate-800/50 bg-slate-900 z-10 flex justify-center">
                            <button 
                                onClick={() => {
                                    notify("Đang ép đồng bộ lên mây...");
                                    syncData(materials, purchases, products);
                                }} 
                                disabled={isSaving}
                                className={`flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest transition-colors ${isSaving ? 'text-brand-500 animate-pulse cursor-not-allowed' : 'text-slate-400 hover:text-white cursor-pointer'}`}
                            >
                                {isSaving ? '⏳ Đang lưu...' : '🔄 Đồng bộ ngay'}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 bg-[#f8fafc] relative h-full overflow-hidden">
                        <header className="h-14 md:h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-10 shadow-sm flex-shrink-0 z-10 sticky top-0">
                            <button className="md:hidden mr-3 p-2 -ml-2 text-slate-500 hover:text-brand-500 transition-colors rounded-lg" onClick={() => setIsSidebarOpen(true)}>
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                            </button>
                            <h2 className="font-bold text-base md:text-xl text-slate-800 tracking-tight flex-1 line-clamp-1">
                                {activeTab === 'dashboard' ? 'Báo cáo giá vốn' : activeTab === 'inventory' ? 'Quản lý kho' : activeTab === 'products' ? 'Thiết lập sản phẩm' : 'Cấu hình hệ thống'}
                            </h2>
                            {isLoading && <div className="text-[10px] md:text-xs font-bold text-brand-600 bg-brand-50 px-3 py-1.5 rounded-full animate-pulse whitespace-nowrap ml-2">Đang tải...</div>}
                        </header>

                        <div className="flex-1 overflow-y-auto w-full relative">
                            {activeTab === 'dashboard' && DashboardView()}
                            {activeTab === 'settings' && SettingsView()}

                            {activeTab === 'inventory' && (
                                <div className="p-4 md:p-10 grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-10 max-w-full">
                                    <div className="space-y-6 md:space-y-8">
                                        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                                            <h3 className="font-bold text-slate-800 mb-4 md:mb-6 text-sm md:text-base flex items-center justify-between">
                                                {editingMaterial ? "✏️ Sửa nguyên liệu" : "➕ Thêm nguyên liệu"}
                                                {editingMaterial && <button onClick={() => setEditingMaterial(null)} className="text-xs text-slate-400 hover:text-slate-600">Hủy</button>}
                                            </h3>
                                            <form onSubmit={addOrUpdateMaterial} className="space-y-4 md:space-y-5">
                                                <input name="name" key={"name" + (editingMaterial?.id || "new")} defaultValue={editingMaterial?.name || ""} placeholder="Tên nguyên liệu..." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm" required />
                                                <input name="unit" key={"unit" + (editingMaterial?.id || "new")} defaultValue={editingMaterial?.unit || ""} placeholder="Đơn vị (kg, cái...)" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm" required />
                                                <button className="w-full bg-slate-900 text-white py-3 md:py-3.5 rounded-xl font-bold text-sm">
                                                    {editingMaterial ? "Cập nhật" : "Lưu danh mục"}
                                                </button>
                                            </form>
                                            
                                            <div className="mt-6 border-t border-slate-100 pt-4 max-h-40 overflow-y-auto custom-scrollbar">
                                                {materials.map(m => (
                                                    <div key={m.id} className={`flex items-center justify-between p-2 rounded-lg text-sm mb-1 ${editingMaterial?.id === m.id ? 'bg-brand-50 border border-brand-200' : 'hover:bg-slate-50'}`}>
                                                        <span className="font-medium text-slate-700 truncate mr-2">{m.name}</span>
                                                        <div className="flex gap-2 flex-shrink-0">
                                                            <button onClick={() => setEditingMaterial(m)} className="text-brand-500 hover:text-brand-700 text-xs font-bold px-1">Sửa</button>
                                                            <button onClick={() => deleteMaterial(m.id)} className="text-red-400 hover:text-red-600 text-xs font-bold px-1">Xóa</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                                            <h3 className={`font-bold mb-4 md:mb-6 text-sm md:text-base flex items-center justify-between ${editingPurchase ? 'text-amber-600' : 'text-emerald-700'}`}>
                                                {editingPurchase ? "✏️ Sửa lần nhập" : "📥 Nhập kho thực tế"}
                                                {editingPurchase && <button onClick={() => setEditingPurchase(null)} className="text-[10px] text-slate-400 font-bold uppercase hover:text-slate-600">Hủy</button>}
                                            </h3>
                                            <form onSubmit={addOrUpdatePurchase} className="space-y-4 md:space-y-5">
                                                {/* SỬA: Cập nhật onChange để bắt sự kiện chọn Material */}
                                                <select name="materialId" defaultValue={editingPurchase?.materialId || ''} key={editingPurchase?.id + 'm'} onChange={(e) => setSelectedMaterialIdForPurchase(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" required>
                                                    <option value="">Chọn nguyên liệu</option>
                                                    {[...materials].sort((a, b) => a.name.localeCompare(b.name)).map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                                </select>
                                                <div className="grid grid-cols-2 gap-3 md:gap-4">
                                                    {/* SỬA: Bọc input số lượng bằng div relative và thêm span hiển thị Đơn vị */}
                                                    <div className="relative">
                                                        <input name="quantity" defaultValue={editingPurchase?.quantity || ''} key={editingPurchase?.id + 'q'} type="number" step="any" placeholder="SL" className="w-full px-4 py-3 pr-12 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-brand-500" required />
                                                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 uppercase">
                                                            {materials.find(m => m.id === (editingPurchase ? editingPurchase.materialId : selectedMaterialIdForPurchase))?.unit || ''}
                                                        </span>
                                                    </div>
                                                    <input name="totalCost" defaultValue={editingPurchase ? (editingPurchase.quantity * editingPurchase.price) : ''} key={editingPurchase?.id + 't'} type="number" placeholder="Tổng tiền (đ)" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-brand-600 text-sm" required />
                                                </div>
                                                <input name="date" defaultValue={editingPurchase?.date || new Date().toISOString().split('T')[0]} key={editingPurchase?.id + 'd'} type="date" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" />
                                                
                                                <div>
                                                    <label className="text-[10px] md:text-xs font-bold text-slate-400 mb-1.5 block">Hóa đơn đính kèm (tùy chọn)</label>
                                                    <input type="file" name="receiptImage" accept="image/*" className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs md:text-sm text-slate-500 file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100" />
                                                    {editingPurchase?.receiptImage && <p className="text-[10px] text-brand-600 mt-1 italic">* Dòng này đang có hóa đơn. Thêm ảnh mới sẽ ghi đè ảnh cũ.</p>}
                                                </div>

                                                <button className={`w-full text-white py-3 md:py-3.5 rounded-xl font-bold text-sm shadow-md ${editingPurchase ? 'bg-amber-500 shadow-amber-100 hover:bg-amber-600' : 'bg-emerald-600 shadow-emerald-100 hover:bg-emerald-700'}`}>
                                                    {editingPurchase ? "Cập nhật lần nhập" : "Ghi nhận nhập kho"}
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                    
                                    <div className="lg:col-span-2 bg-white rounded-2xl md:rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[500px] md:h-auto">
                                        {/* SỬA: Thêm thanh tìm kiếm cho Lịch sử nhập kho */}
                                        <div className="px-4 py-4 md:px-8 md:py-6 border-b bg-slate-50/50 flex flex-wrap justify-between items-center gap-2">
                                            <div className="flex items-center gap-4 w-full sm:w-auto flex-1">
                                                <h3 className="font-bold text-slate-700 text-sm md:text-base whitespace-nowrap">🕒 Nhật ký nhập kho</h3>
                                                <input type="text" placeholder="🔍 Tìm kiếm..." value={searchInventory} onChange={(e) => setSearchInventory(e.target.value)} className="px-3 py-1.5 text-xs md:text-sm border border-slate-200 rounded-lg outline-none focus:border-brand-500 w-full max-w-[200px]" />
                                            </div>
                                            <div className="flex gap-2 md:gap-4">
                                                <button onClick={exportPurchaseHistory} className="text-[10px] md:text-xs font-bold text-brand-600 bg-brand-50 px-3 py-1.5 md:px-4 md:py-2 rounded-lg md:rounded-xl hover:bg-brand-100 transition-colors">Xuất Excel</button>
                                                <button onClick={() => { if(window.confirm("CẢNH BÁO: Bạn có chắc chắn muốn xóa TOÀN BỘ dữ liệu nhập kho không? Hành động này không thể hoàn tác!")) { setPurchases([]); syncData(materials, [], products); } }} className="text-[10px] md:text-xs font-bold text-red-400 hover:text-red-500 px-2">Làm sạch</button>
                                            </div>
                                        </div>
                                        <div className="overflow-auto flex-1 custom-scrollbar w-full">
                                            <table className="w-full text-left text-xs md:text-sm whitespace-nowrap min-w-[500px]">
                                                {/* SỬA: Thêm cột Đơn vị */}
                                                <thead className="bg-slate-50 text-[10px] md:text-[11px] font-bold text-slate-400 border-b sticky top-0">
                                                    <tr>
                                                        <th className="px-4 py-3 md:px-8 md:py-4">Ngày</th>
                                                        <th className="px-4 py-3 md:px-8 md:py-4">Tên hàng</th>
                                                        <th className="px-4 py-3 md:px-8 md:py-4 text-right">SL</th>
                                                        <th className="px-4 py-3 md:px-8 md:py-4 text-center">Đơn vị</th>
                                                        <th className="px-4 py-3 md:px-8 md:py-4 text-right">Thành tiền</th>
                                                        <th className="px-4 py-3 md:px-8 md:py-4 text-center">Thao tác</th>
                                                    </tr>
                                                </thead>
                                                {/* SỬA: Lọc dữ liệu theo searchInventory và render cột Đơn vị */}
                                                <tbody className="divide-y divide-slate-100">
                                                    {[...purchases]
                                                        .filter(p => {
                                                            const matName = materials.find(m => m.id === p.materialId)?.name || "";
                                                            return matName.toLowerCase().includes(searchInventory.toLowerCase());
                                                        })
                                                        .sort((a, b) => new Date(b.date) - new Date(a.date))
                                                        .map(p => {
                                                            const mat = materials.find(m => m.id === p.materialId);
                                                            return (
                                                                <tr key={p.id} className={`transition ${editingPurchase?.id === p.id ? 'bg-amber-50' : 'hover:bg-slate-50'}`}>
                                                                    <td className="px-4 py-3 md:px-8 md:py-5 text-slate-400">
                                                                        {p.date.split('-').reverse().join('/')}
                                                                        {p.receiptImage && (
                                                                            <button onClick={() => setViewingImage(p.receiptImage)} className="ml-2 text-brand-500 hover:text-brand-700" title="Xem hóa đơn">🖼️</button>
                                                                        )}
                                                                    </td>
                                                                    <td className="px-4 py-3 md:px-8 md:py-5 font-bold truncate max-w-[120px] md:max-w-none">{mat?.name}</td>
                                                                    <td className="px-4 py-3 md:px-8 md:py-5 text-right">{p.quantity}</td>
                                                                    <td className="px-4 py-3 md:px-8 md:py-5 text-center text-slate-500 font-medium">{mat?.unit}</td>
                                                                    <td className="px-4 py-3 md:px-8 md:py-5 text-right font-bold text-brand-600">{Math.round(p.quantity * p.price).toLocaleString()}đ</td>
                                                                    <td className="px-4 py-3 md:px-8 md:py-5 text-center flex justify-center gap-2">
                                                                        <button onClick={() => setEditingPurchase(p)} className="text-amber-500 hover:text-amber-600 font-bold px-2">Sửa</button>
                                                                        <button onClick={() => deletePurchaseLine(p.id)} className="text-slate-300 hover:text-red-500 font-bold px-2">✕</button>
                                                                    </td>
                                                                </tr>
                                                            );
                                                    })}
                                                    {purchases.length === 0 && <tr><td colSpan="6" className="text-center py-10 text-slate-400 text-xs italic">Chưa có lịch sử nhập kho</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'products' && (
                                <div className="p-4 md:p-10 space-y-8 md:space-y-10">
                                    <div className="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] shadow-sm border border-slate-200 grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-16">
                                        <div className="space-y-6 md:space-y-8">
                                            <div className="flex justify-between items-center">
                                                <h3 className="font-bold text-slate-800 text-sm md:text-base">
                                                    {newProduct.id ? "✏️ Sửa định mức sản phẩm" : "Thêm sản phẩm mới"}
                                                </h3>
                                                {newProduct.id && (
                                                    <button onClick={() => setNewProduct({ id: null, name: '', recipe: [], customCost: 0 })} className="text-[10px] md:text-xs text-slate-400 hover:text-slate-600 font-bold uppercase bg-slate-100 px-3 py-1.5 rounded-lg">
                                                        Hủy Sửa
                                                    </button>
                                                )}
                                            </div>

                                            <input value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} placeholder="Tên sản phẩm..." className="w-full px-6 py-4 md:px-8 md:py-5 bg-slate-50 border-none rounded-2xl md:rounded-3xl font-bold text-lg md:text-2xl outline-none focus:ring-2 focus:ring-brand-500/20" />
                                            
                                            <div className="mt-4">
                                                <label className="text-[10px] md:text-xs font-bold text-slate-400 mb-1.5 block">Phụ phí ước tính (điện, nước, hao hụt...) (đ)</label>
                                                <input type="number" placeholder="0" value={newProduct.customCost} onChange={e => setNewProduct({...newProduct, customCost: e.target.value})} className="w-full md:w-1/2 px-4 py-3 border border-slate-200 rounded-xl text-sm outline-none focus:border-brand-500" />
                                            </div>

                                            <div>
                                                <div className="flex justify-between items-center mb-3 gap-2">
                                                    <p className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider mb-0">Chọn vật tư cấu thành:</p>
                                                    <input type="text" placeholder="🔍 Tìm vật tư..." value={searchRecipeMaterial} onChange={(e) => setSearchRecipeMaterial(e.target.value)} className="px-3 py-1.5 text-[10px] md:text-xs border border-slate-200 rounded-lg outline-none focus:border-brand-500 w-32 md:w-48 bg-white" />
                                                </div>
                                                <div className="flex flex-wrap gap-2 max-h-40 overflow-y-auto custom-scrollbar p-1 -m-1">
                                                    {[...materials]
                                                        .filter(m => m.name.toLowerCase().includes(searchRecipeMaterial.toLowerCase()))
                                                        .sort((a, b) => a.name.localeCompare(b.name))
                                                        .map(m => (
                                                            <button type="button" key={m.id} onClick={() => {
                                                                setNewProduct({...newProduct, recipe: [...newProduct.recipe, { materialId: m.id, name: m.name, amount: 0, costValue: 0, inputType: 'quantity', unit: m.unit }]});
                                                                setSearchRecipeMaterial(''); // Tự động xóa ô tìm kiếm sau khi chọn xong để chọn món khác
                                                            }} className="px-3 py-1.5 md:px-4 md:py-2 bg-slate-100 text-[10px] md:text-xs font-bold rounded-lg hover:bg-brand-500 hover:text-white transition shadow-sm">+ {m.name}</button>
                                                    ))}
                                                    {materials.filter(m => m.name.toLowerCase().includes(searchRecipeMaterial.toLowerCase())).length === 0 && <p className="text-[10px] text-slate-400 italic w-full">Không tìm thấy vật tư phù hợp</p>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50/80 p-5 md:p-8 rounded-2xl md:rounded-[2rem] border-2 border-dashed border-slate-200 flex flex-col h-full">
                                            <h4 className="font-bold text-slate-500 mb-4 md:mb-6 text-xs md:text-sm">Chi tiết định mức (BOM)</h4>
                                            <div className="space-y-3 flex-1 overflow-y-auto pr-1 custom-scrollbar min-h-[150px] max-h-60">
                                                {newProduct.recipe.map((item, idx) => (
                                                    <div key={idx} className="flex flex-col gap-2 md:gap-3 bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-100">
                                                        <div className="flex items-center justify-between">
                                                            <span className="font-bold text-[11px] md:text-xs truncate text-brand-600">{item.name}</span>
                                                            <div className="flex gap-2">
                                                                <button type="button" onClick={() => { const updated = [...newProduct.recipe]; updated[idx].inputType = updated[idx].inputType === 'cost' ? 'quantity' : 'cost'; setNewProduct({...newProduct, recipe: updated}); }} className="text-[9px] md:text-[10px] text-slate-500 bg-slate-100 px-2 py-1 rounded hover:bg-slate-200 transition font-bold">
                                                                    {item.inputType === 'cost' ? '⇌ Nhập SL' : '⇌ Nhập tiền'}
                                                                </button>
                                                                <button onClick={() => setNewProduct({...newProduct, recipe: newProduct.recipe.filter((_, i) => i !== idx)})} className="text-slate-300 hover:text-red-500 font-bold px-1">✕</button>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="flex items-center gap-2">
                                                            {item.inputType === 'cost' ? (
                                                                <>
                                                                    <input type="number" placeholder="Ước tính số tiền (đ)" className="w-full text-right bg-amber-50 border border-amber-100 p-1.5 md:p-2 rounded-lg font-bold text-amber-700 text-xs md:text-sm outline-none" value={item.costValue || ''} onChange={e => { const updated = [...newProduct.recipe]; updated[idx].costValue = Number(e.target.value); setNewProduct({...newProduct, recipe: updated}); }} />
                                                                    <span className="text-[9px] md:text-[10px] font-bold text-slate-400 w-8">VNĐ</span>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <input type="number" placeholder="Số lượng..." className="w-full text-right bg-slate-50 border border-slate-100 p-1.5 md:p-2 rounded-lg font-bold text-brand-600 text-xs md:text-sm outline-none" value={item.amount || ''} onChange={e => { const updated = [...newProduct.recipe]; updated[idx].amount = Number(e.target.value); setNewProduct({...newProduct, recipe: updated}); }} />
                                                                    <span className="text-[9px] md:text-[10px] font-bold text-slate-400 w-8 truncate">{item.unit}</span>
                                                                </>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                                {newProduct.recipe.length === 0 && <p className="text-center text-slate-300 italic text-[11px] py-10">Chưa chọn vật tư</p>}
                                            </div>
                                            <button onClick={saveProduct} className="w-full bg-brand-600 text-white py-3 md:py-4 rounded-xl md:rounded-2xl font-bold mt-6 shadow-lg shadow-brand-200 text-sm md:text-base">
                                                {newProduct.id ? "Cập nhật sản phẩm" : "Lưu sản phẩm mới"}
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 pb-16">
                                        {products.map(p => (
                                            <div key={p.id} className="bg-white rounded-2xl md:rounded-[2rem] p-6 md:p-8 border border-slate-200 flex flex-col h-full shadow-sm relative transition-all hover:shadow-xl group">
                                                <div className="flex justify-between items-start mb-4 md:mb-6">
                                                    <h4 className="text-lg md:text-xl font-black pr-16 leading-tight">{p.name}</h4>
                                                    
                                                    <div className="absolute top-6 right-6 flex gap-2">
                                                        <button onClick={() => {
                                                            setNewProduct({ id: p.id, name: p.name, recipe: [...p.recipe], customCost: p.customCost || 0 });
                                                            window.scrollTo({ top: 0, behavior: 'smooth' });
                                                        }} className="text-brand-500 hover:text-brand-700 font-bold bg-brand-50 px-3 py-1.5 rounded-lg text-[10px] md:text-xs transition-colors">
                                                            Sửa
                                                        </button>
                                                        <button onClick={() => { if(confirm("Xóa sản phẩm này?")) { const n = products.filter(pr => pr.id !== p.id); setProducts(n); syncData(materials, purchases, n); }}} className="text-slate-400 hover:text-red-500 font-bold bg-slate-50 px-3 py-1.5 rounded-lg text-[10px] md:text-xs transition-colors">✕</button>
                                                    </div>
                                                </div>
                                                <div className="bg-slate-50 p-4 md:p-6 rounded-xl md:rounded-2xl text-center mb-4 md:mb-6">
                                                    <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase mb-1">Giá vốn dự kiến</p>
                                                    <p className="text-2xl md:text-3xl font-black text-brand-600">{Math.round(calculateProductCOGS(p)).toLocaleString()} đ</p>
                                                </div>
                                                <div className="space-y-1.5 md:space-y-2 text-[11px] md:text-xs text-slate-500 flex-grow">
                                                    {p.recipe.map((r, i) => (
                                                        <div key={i} className="flex justify-between border-b border-dashed border-slate-100 pb-1">
                                                            <span>{r.name}</span>
                                                            <span className="font-bold">
                                                                {r.inputType === 'cost' ? <span className="text-amber-600">{Number(r.costValue||0).toLocaleString()} đ</span> : `${r.amount} ${r.unit}`}
                                                            </span>
                                                        </div>
                                                    ))}
                                                </div>
                                                
                                                {p.customCost > 0 && (
                                                    <div className="mt-4 md:mt-6 pt-3 md:pt-4 border-t border-slate-100 text-[10px] md:text-[11px] text-slate-500 font-medium">
                                                        <div className="flex justify-between bg-slate-50 text-slate-700 px-3 py-2 rounded-lg">
                                                            <span>Phụ phí:</span><span className="font-bold">{Number(p.customCost||0).toLocaleString()} đ</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                        
                        {showNotification && (
                            <div className="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-slate-900 text-white px-5 py-3 md:px-8 md:py-5 rounded-2xl md:rounded-3xl shadow-2xl z-[100] animate-bounce">
                                <span className="font-bold text-xs md:text-sm">{showNotification}</span>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        window.addEventListener('load', () => { const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />); });
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail: ', err));
            });
        }
    </script>
</body>
</html>
