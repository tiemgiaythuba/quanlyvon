<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tiệm giấy Thứ Ba - Quản lý giá vốn</title>
    
    <link rel="icon" href="./tachnen.png">
    <link rel="shortcut icon" href="./tachnen.png">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="tiệm giấy Thứ Ba - Quản lý giá vốn">
    <link rel="apple-touch-icon" href="./tachnen.png"> <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#ea580c', 600: '#c2410c' }, slate: { 800: '#1e293b', 900: '#0f172a' } }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .nav-active { background-color: #ea580c !important; color: white !important; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.25); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [materials, setMaterials] = useState([]);
            const [purchases, setPurchases] = useState([]);
            const [products, setProducts] = useState([]);
            const [showNotification, setShowNotification] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            
            const [scriptUrl, setScriptUrl] = useState(localStorage.getItem('tg_script_url') || '');
            const [newProduct, setNewProduct] = useState({ name: '', recipe: [], packagingCost: 0, laborCost: 0, customCost: 0 });
            const fileInputRef = useRef(null);

            useEffect(() => { if (!scriptUrl) return; loadData(); }, []);

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(scriptUrl);
                    const data = await response.json();
                    setMaterials(data.materials || []);
                    setPurchases(data.purchases || []);
                    setProducts(data.products || []);
                    notify("Đã đồng bộ dữ liệu từ máy chủ");
                } catch (err) {
                    console.error(err);
                    notify("Không thể kết nối Script. Vui lòng kiểm tra lại cài đặt.");
                } finally { setIsLoading(false); }
            };

            const syncData = async (m, pur, pro) => {
                if (!scriptUrl) return;
                setIsSaving(true);
                try {
                    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ materials: m, purchases: pur, products: pro }) });
                } catch (err) {
                    console.error(err);
                    notify("Lỗi lưu dữ liệu lên máy chủ!");
                } finally { setIsSaving(false); }
            };

            const notify = (msg) => {
                setShowNotification(msg);
                setTimeout(() => setShowNotification(null), 3000);
            };

            const materialCosts = useMemo(() => {
                const costs = {};
                materials.forEach(m => {
                    const matPurchases = purchases.filter(p => p.materialId === m.id);
                    if (matPurchases.length === 0) { costs[m.id] = 0; return; }
                    const totalQty = matPurchases.reduce((sum, p) => sum + Number(p.quantity), 0);
                    const totalVal = matPurchases.reduce((sum, p) => sum + (Number(p.quantity) * Number(p.price)), 0);
                    costs[m.id] = totalQty > 0 ? totalVal / totalQty : 0;
                });
                return costs;
            }, [materials, purchases]);

            const calculateProductCOGS = (product) => {
                let ingredientTotal = 0;
                product.recipe.forEach(item => {
                    const avgPrice = materialCosts[item.materialId] || 0;
                    const costWithWastage = (item.amount * avgPrice) / (1 - (item.wastage / 100));
                    ingredientTotal += costWithWastage;
                });
                return ingredientTotal + Number(product.packagingCost || 0) + Number(product.laborCost || 0) + Number(product.customCost || 0);
            };

            const addMaterial = (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const unit = e.target.unit.value;
                if (!name) return;
                const newM = [...materials, { id: Date.now().toString(), name, unit }];
                setMaterials(newM); syncData(newM, purchases, products);
                e.target.reset(); notify("Đã thêm nguyên liệu");
            };

            const addPurchase = (e) => {
                e.preventDefault();
                const materialId = e.target.materialId.value;
                const quantity = Number(e.target.quantity.value);
                const totalCost = Number(e.target.totalCost.value);
                if (!materialId || quantity <= 0 || totalCost < 0) return;
                const price = totalCost / quantity;
                const newPur = [...purchases, { id: Date.now().toString(), materialId, quantity, price, date: e.target.date.value || new Date().toISOString().split('T')[0] }];
                setPurchases(newPur); syncData(materials, newPur, products);
                e.target.reset(); notify("Đã ghi nhận nhập kho");
            };

            const saveProduct = () => {
                if (!newProduct.name || newProduct.recipe.length === 0) return notify("Vui lòng điền đủ thông tin");
                const newPro = [...products, { ...newProduct, id: Date.now().toString() }];
                setProducts(newPro); syncData(materials, purchases, newPro);
                setNewProduct({ name: '', recipe: [], packagingCost: 0, laborCost: 0, customCost: 0 });
                notify("Đã lưu định mức sản phẩm");
            };

            const deleteMaterial = (id) => {
                if (purchases.some(p => p.materialId === id)) return notify("Dữ liệu đã có nhập kho, không thể xóa");
                const newM = materials.filter(m => m.id !== id);
                setMaterials(newM); syncData(newM, purchases, products);
            };

            const exportPurchaseHistory = () => {
                if (purchases.length === 0) return notify("Không có dữ liệu để xuất");
                const bom = '\uFEFF';
                const csv = "Ngày;Tên nguyên liệu;Số lượng;Đơn giá bình quân;Thành tiền\n" + 
                    [...purchases].reverse().map(p => {
                        const m = materials.find(mat => mat.id === p.materialId);
                        const name = m ? m.name : 'Đã xóa';
                        return `${p.date};${name};${p.quantity};${Math.round(p.price)};${Math.round(p.quantity * p.price)}`;
                    }).join("\n");
                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "lich_su_nhap_kho_giathuba.csv"; link.click();
            };

            const DashboardView = () => (
                <div className="flex-1 overflow-auto p-8 space-y-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div className="bg-white p-6 rounded-2xl border border-slate-200">
                            <p className="text-sm font-medium text-slate-500">📦 Tổng nguyên liệu</p>
                            <p className="text-3xl font-bold text-slate-900 mt-2">{materials.length}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-slate-200">
                            <p className="text-sm font-medium text-slate-500">🛒 Số lần nhập hàng</p>
                            <p className="text-3xl font-bold text-slate-900 mt-2">{purchases.length}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-brand-100 bg-brand-50/20">
                            <p className="text-sm font-medium text-brand-600">📝 Sản phẩm định mức</p>
                            <p className="text-3xl font-bold text-brand-600 mt-2">{products.length}</p>
                        </div>
                        <button onClick={() => {
                            const bom = '\uFEFF';
                            const csv = "Tên;Đơn vị;Giá TB\n" + materials.map(m => `${m.name};${m.unit};${Math.round(materialCosts[m.id])}`).join("\n");
                            const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "bao_cao_giathuba.csv"; link.click();
                        }} className="bg-slate-900 text-white p-6 rounded-2xl shadow-lg hover:bg-slate-800 transition flex items-center justify-between group text-left">
                            <div><p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Báo cáo</p><p className="text-lg font-bold">Xuất Excel</p></div>
                            <span className="text-2xl group-hover:scale-110 transition">📥</span>
                        </button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="px-6 py-5 bg-slate-50/50 border-b border-slate-200 flex items-center gap-3">
                            <span className="text-lg">⚠️</span>
                            <h3 className="font-bold text-slate-800 text-base">Giá vốn bình quân nguyên liệu</h3>
                        </div>
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[11px] font-bold text-slate-500 border-b">
                                <tr>
                                    <th className="px-8 py-4">Tên nguyên liệu</th>
                                    <th className="px-8 py-4">Đơn vị</th>
                                    <th className="px-8 py-4 text-right">Giá bình quân</th>
                                    <th className="px-8 py-4 text-right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y text-sm">
                                {materials.map(m => (
                                    <tr key={m.id} className="hover:bg-slate-50 transition group">
                                        <td className="px-8 py-4 font-semibold text-slate-700">{m.name}</td>
                                        <td className="px-8 py-4 text-slate-500">{m.unit}</td>
                                        <td className="px-8 py-4 text-right font-bold text-brand-600">{Math.round(materialCosts[m.id]).toLocaleString()} đ</td>
                                        <td className="px-8 py-4 text-right"><button onClick={() => deleteMaterial(m.id)} className="text-slate-300 hover:text-red-500 transition font-medium px-2">Xóa</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            const SettingsView = () => (
                <div className="flex-1 p-12 max-w-2xl mx-auto space-y-10">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-200">
                        <h3 className="text-2xl font-black text-slate-800 mb-2">⚙️ Cài đặt hệ thống</h3>
                        <p className="text-slate-500 text-sm mb-8">Kết nối với Google Sheets để đồng bộ dữ liệu theo thời gian thực.</p>
                        <div className="space-y-6">
                            <div>
                                <label className="text-xs font-bold text-slate-400 mb-2 block uppercase tracking-widest">Google Apps Script URL</label>
                                <textarea className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all font-mono text-xs" rows="4" placeholder="https://script.google.com/macros/s/..." value={scriptUrl} onChange={(e) => setScriptUrl(e.target.value)} />
                            </div>
                            <button onClick={() => { localStorage.setItem('tg_script_url', scriptUrl); notify("Đã lưu cấu hình. Đang tải lại dữ liệu..."); loadData(); }} className="w-full bg-brand-600 text-white py-5 rounded-2xl font-bold hover:bg-brand-700 transition-all shadow-xl shadow-brand-100">Lưu cấu hình & Đồng bộ</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-full relative">
                    <aside className="w-64 bg-slate-900 flex-shrink-0 flex flex-col shadow-2xl z-20">
                        <div className="p-8 flex flex-col items-center bg-slate-800/30 border-b border-slate-700/50">
                            {/* Đã sửa tên file ảnh ở đây */}
                            <div className="w-16 h-16 rounded-2xl bg-brand-500 mb-4 flex items-center justify-center text-white text-3xl font-black shadow-lg shadow-brand-500/20 overflow-hidden relative">
                                <span className="absolute z-0">📄</span>
                                <img src="./tachnen.png" alt="Logo" className="w-full h-full object-cover relative z-10" onError={(e)=>e.target.style.display='none'} />
                            </div>
                            <h1 className="text-white font-extrabold text-sm leading-tight tracking-tight text-center">tiệm giấy <span className="text-brand-500 text-lg font-black">Thứ Ba</span></h1>
                        </div>
                        
                        <nav className="flex-1 px-4 py-8 space-y-3">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-left ${activeTab === 'dashboard' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>🏠 Tổng quan</span></button>
                            <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-left ${activeTab === 'inventory' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>🛒 Kho hàng</span></button>
                            <button onClick={() => setActiveTab('products')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-left ${activeTab === 'products' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>📈 Định mức</span></button>
                            <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-left ${activeTab === 'settings' ? 'nav-active' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>⚙️ Cài đặt</span></button>
                        </nav>
                        <div className="p-5 text-[10px] font-bold text-slate-500 text-center border-t border-slate-800/50 tracking-widest uppercase">{isSaving ? <span className="text-brand-500 animate-pulse">Đang lưu mây...</span> : <span>Đã đồng bộ ✓</span>}</div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 bg-[#f8fafc] relative h-full overflow-hidden">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-10 shadow-sm flex-shrink-0 z-10">
                            <h2 className="font-bold text-xl text-slate-800 tracking-tight">{activeTab === 'dashboard' ? 'Báo cáo giá vốn' : activeTab === 'inventory' ? 'Quản lý kho' : activeTab === 'products' ? 'Thiết lập sản phẩm' : 'Cấu hình hệ thống'}</h2>
                            {isLoading && <div className="text-xs font-bold text-brand-600 bg-brand-50 px-4 py-1.5 rounded-full animate-pulse">Đang tải dữ liệu...</div>}
                        </header>

                        <div className="flex-1 overflow-auto">
                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'settings' && <SettingsView />}

                            {activeTab === 'inventory' && (
                                <div className="p-10 grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="space-y-8">
                                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                                            <h3 className="font-bold text-slate-800 mb-6">➕ Thêm nguyên liệu</h3>
                                            <form onSubmit={addMaterial} className="space-y-5">
                                                <input name="name" placeholder="Tên nguyên liệu..." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500" required />
                                                <input name="unit" placeholder="Đơn vị (Kg, Cái...)" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500" required />
                                                <button className="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold">Lưu danh mục</button>
                                            </form>
                                        </div>
                                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                                            <h3 className="font-bold text-slate-800 mb-6 text-emerald-600">📥 Nhập kho thực tế</h3>
                                            <form onSubmit={addPurchase} className="space-y-5">
                                                <select name="materialId" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" required>
                                                    <option value="">Chọn nguyên liệu</option>
                                                    {[...materials].sort((a, b) => a.name.localeCompare(b.name)).map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                                </select>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <input name="quantity" type="number" step="any" placeholder="SL" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" required />
                                                    <input name="totalCost" type="number" placeholder="Tổng tiền (đ)" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-brand-600" required />
                                                </div>
                                                <input name="date" type="date" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" defaultValue={new Date().toISOString().split('T')[0]} />
                                                <button className="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold">Ghi nhận nhập kho</button>
                                            </form>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                        <div className="px-8 py-6 border-b bg-slate-50/50 flex justify-between items-center">
                                            <h3 className="font-bold text-slate-700">🕒 Nhật ký nhập kho</h3>
                                            <div className="flex gap-4">
                                                <button onClick={exportPurchaseHistory} className="text-xs font-bold text-brand-600 bg-brand-50 px-4 py-2 rounded-xl hover:bg-brand-100 transition-colors">📥 Xuất Excel</button>
                                                <button onClick={() => { if(confirm("Xóa toàn bộ dữ liệu?")) { setPurchases([]); syncData(materials, [], products); } }} className="text-xs font-bold text-red-400 hover:text-red-500">Làm sạch</button>
                                            </div>
                                        </div>
                                        <div className="overflow-auto flex-1 custom-scrollbar">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 text-[11px] font-bold text-slate-400 border-b sticky top-0"><tr><th className="px-8 py-4">Ngày</th><th className="px-8 py-4">Tên hàng</th><th className="px-8 py-4 text-right">SL</th><th className="px-8 py-4 text-right">Thành tiền</th></tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {[...purchases].reverse().map(p => (
                                                        <tr key={p.id}>
                                                            <td className="px-8 py-5 text-slate-400">{p.date}</td>
                                                            <td className="px-8 py-5 font-bold">{materials.find(m => m.id === p.materialId)?.name}</td>
                                                            <td className="px-8 py-5 text-right">{p.quantity}</td>
                                                            <td className="px-8 py-5 text-right font-bold">{Math.round(p.quantity * p.price).toLocaleString()}đ</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'products' && (
                                <div className="p-10 space-y-10">
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-200 grid grid-cols-1 lg:grid-cols-2 gap-16">
                                        <div className="space-y-8">
                                            <input value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} placeholder="Tên sản phẩm mới..." className="w-full px-8 py-5 bg-slate-50 border-none rounded-3xl font-bold text-2xl outline-none focus:ring-4 focus:ring-brand-500/10" />
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                <input type="number" placeholder="Chi phí bao bì" value={newProduct.packagingCost} onChange={e => setNewProduct({...newProduct, packagingCost: e.target.value})} className="px-5 py-3 border border-slate-200 rounded-2xl" />
                                                <input type="number" placeholder="Công nhân (đ)" value={newProduct.laborCost} onChange={e => setNewProduct({...newProduct, laborCost: e.target.value})} className="px-5 py-3 border border-slate-200 rounded-2xl" />
                                                <input type="number" placeholder="Phụ phí (gỗ...)" value={newProduct.customCost} onChange={e => setNewProduct({...newProduct, customCost: e.target.value})} className="px-5 py-3 border border-slate-200 rounded-2xl" />
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {materials.map(m => (<button key={m.id} onClick={() => setNewProduct({...newProduct, recipe: [...newProduct.recipe, { materialId: m.id, name: m.name, amount: 0, wastage: 0, unit: m.unit }]})} className="px-4 py-2 bg-slate-100 text-xs font-bold rounded-xl hover:bg-brand-500 hover:text-white transition">+ {m.name}</button>))}
                                            </div>
                                        </div>
                                        <div className="bg-slate-50/50 p-8 rounded-[2rem] border-2 border-dashed border-slate-200">
                                            <h4 className="font-bold text-slate-500 mb-6 text-sm">Chi tiết định mức (BOM)</h4>
                                            <div className="space-y-4 max-h-60 overflow-auto pr-2 custom-scrollbar">
                                                {newProduct.recipe.map((item, idx) => (
                                                    <div key={idx} className="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm">
                                                        <span className="flex-1 font-bold text-xs truncate">{item.name}</span>
                                                        <input type="number" className="w-16 text-right bg-slate-50 p-2 rounded-lg font-bold text-brand-600" value={item.amount} onChange={e => { const updated = [...newProduct.recipe]; updated[idx].amount = Number(e.target.value); setNewProduct({...newProduct, recipe: updated}); }} />
                                                        <span className="text-[10px] font-bold text-slate-400">{item.unit}</span>
                                                        <button onClick={() => setNewProduct({...newProduct, recipe: newProduct.recipe.filter((_, i) => i !== idx)})} className="text-slate-300 hover:text-red-500 font-bold">✕</button>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={saveProduct} className="w-full bg-brand-600 text-white py-4 rounded-2xl font-bold mt-8 shadow-lg shadow-brand-100">Lưu sản phẩm</button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-16">
                                        {products.map(p => (
                                            <div key={p.id} className="bg-white rounded-[2rem] p-8 border border-slate-200 flex flex-col h-full">
                                                <div className="flex justify-between items-start mb-6">
                                                    <h4 className="text-xl font-black">{p.name}</h4>
                                                    <button onClick={() => { if(confirm("Xóa sản phẩm?")) { const n = products.filter(pr => pr.id !== p.id); setProducts(n); syncData(materials, purchases, n); }}} className="text-slate-200 hover:text-red-500">✕</button>
                                                </div>
                                                <div className="bg-slate-50 p-6 rounded-2xl text-center mb-6">
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Giá vốn dự kiến</p>
                                                    <p className="text-3xl font-black text-brand-600">{Math.round(calculateProductCOGS(p)).toLocaleString()} đ</p>
                                                </div>
                                                <div className="space-y-2 text-xs text-slate-500 flex-grow">
                                                    {p.recipe.map((r, i) => <div key={i} className="flex justify-between"><span>• {r.name}</span><span className="font-bold">{r.amount} {r.unit}</span></div>)}
                                                </div>
                                                <div className="mt-6 pt-4 border-t border-slate-100 space-y-2 text-[11px] text-slate-500 font-medium">
                                                    <div className="flex justify-between"><span>Bao bì & Công:</span><span>{(Number(p.packagingCost||0) + Number(p.laborCost||0)).toLocaleString()} đ</span></div>
                                                    {p.customCost > 0 && <div className="flex justify-between text-brand-600 font-bold"><span>Vật tư linh hoạt:</span><span>{Number(p.customCost||0).toLocaleString()} đ</span></div>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                        {showNotification && (<div className="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-3xl shadow-2xl z-[100] animate-bounce"><span className="font-bold text-sm">{showNotification}</span></div>)}
                    </main>
                </div>
            );
        };

        window.addEventListener('load', () => { const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />); });
        
        // Cài đặt Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail: ', err));
            });
        }
    </script>
</body>
</html>
